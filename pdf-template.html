<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แบบ นร./กสศ.01</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   BASE CONFIGURATION — A4 210×297mm
══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sarabun', sans-serif;
  font-size: 8.5pt;
  color: #000;
  background: #ffffff;
}

@page {
  size: A4 portrait;
  margin: 0;
}

.page {
  width: 210mm;
  height: 297mm;
  padding: 12mm 12mm 10mm 14mm;
  background: #fff;
  position: relative;
  page-break-after: always;
  overflow: hidden;
}

.page:last-child { page-break-after: avoid; }

/* ── หัวมุมระบุหน้า ── */
.page-badge {
  position: absolute;
  top: 6mm;
  right: 12mm;
  text-align: right;
}
.page-badge .badge-box {
  display: inline-block;
  border: 1px solid #000;
  padding: 1mm 2.5mm;
  font-weight: 700;
  font-size: 8.5pt;
}

/* ── ส่วนหัวฟอร์มและโลโก้ ── */
.form-title-block {
  display: block;
  margin-bottom: 3mm;
  margin-top: 4mm;
  position: relative;
  min-height: 32mm;
}
.kss-logo-img {
  width: 16mm;
  height: 16mm;
  background: #1a56db;
  border-radius: 2mm;
  text-align: center;
  line-height: 16mm;
  color: #fff;
  font-size: 13pt;
  font-weight: 800;
  position: absolute;
}
.form-title-center {
  margin-left: 20mm;
  margin-right: 30mm;
  text-align: center;
}
.form-title-center h1 { font-size: 14pt; font-weight: 700; }
.form-title-center h2 { font-size: 11pt; font-weight: 600; }

/* ── กล่องเลขบัตรประชาชน 13 หลัก ── */
.id-boxes { display: inline-block; vertical-align: middle; }
.id-box {
  display: inline-block;
  width: 5.5mm;
  height: 5.5mm;
  border: 1px solid #000;
  text-align: center;
  line-height: 5.5mm;
  font-size: 9pt;
  font-weight: 700;
  margin-right: 0.3mm;
  background: #fff;
}
.id-dash { font-size: 9pt; margin: 0 1mm; display: inline-block; vertical-align: middle; }

/* ── ส่วนแสดงเครื่องหมายเลือกตัวเลือก ── */
.r-circle {
  display: inline-block;
  width: 3.5mm;
  height: 3.5mm;
  border: 1px solid #000;
  border-radius: 50%;
  margin-right: 1mm;
  vertical-align: middle;
  text-align: center;
  line-height: 3.5mm;
}
.r-circle.filled::after {
  content: '●';
  font-size: 5pt;
  display: block;
  color: #000;
}

/* ── ตารางสมาชิกเครือข่ายครัวเรือน ── */
.mem-table { width: 100%; border-collapse: collapse; font-size: 7.5pt; }
.mem-table th, .mem-table td { border: 1px solid #000; padding: 1mm 0.5mm; text-align: center; }
.mem-table th { background: #f5f5f5; font-weight: 700; }
.mem-table td.name-cell { text-align: left; padding-left: 1mm; }

/* ── กล่องลายเซ็นและรูปภาพ ── */
.photo-slot { border: 1px solid #000; height: 42mm; background: #fafafa; text-align: center; padding-top: 15mm; position: relative; }
.sig-canvas-box { border: 1px solid #000; height: 18mm; background: #fafafa; }
</style>
</head>
<body>

<div id="kss-form-root">
  
  <div class="page" id="kss-page1">
    <div class="page-badge"><div class="badge-box">แบบ นร./กสศ.01 หน้า 1</div></div>
    <div class="form-title-block">
      <div class="kss-logo-img">กสศ</div>
      <div class="form-title-center">
        <h1>แบบขอรับเงินอุดหนุนนักเรียนยากจน</h1>
        <h2>ภาคเรียนที่ 1 ปีการศึกษา 2569</h2>
      </div>
    </div>
    
    <div class="sec-hd">1. ข้อมูลนักเรียน</div>
    <p>ชื่อ-นามสกุลนักเรียน: <span id="pdf-fullname" style="border-bottom:1px dashed #000; padding:0 10px;">-</span></p>
    </div>

</div>

<script>
// ฟังก์ชันลูปใส่ตัวเลขบัตรประชาชนลงกล่องแบบสากลและเสถียรที่สุด
function renderIdToBoxes(containerId, idString) {
    const container = document.getElementById(containerId);
    if (!container) return;
    
    // กรองเอาเฉพาะตัวเลข 13 หลัก
    const cleanId = String(idString || '').replace(/[^0-9]/g, '');
    const boxes = container.querySelectorAll('.id-box');
    
    boxes.forEach((box, index) => {
        if (cleanId[index]) {
            box.textContent = cleanId[index];
        } else {
            box.textContent = ''; // ล้างค่าหากข้อมูลไม่ถึง
        }
    });
}

// ฟังก์ชันสั่ง Export ออกเป็น PDF ความละเอียดสูง 2X ป้องกันภาพแตก
function exportKSS01PDF(filename) {
    const element = document.getElementById('kss-form-root');
    const opt = {
        margin:       0,
        filename:     filename || 'แบบ_นร_กสศ01.pdf',
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, logging: false },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak:    { mode: ['css', 'legacy'] }
    };
    
    // รันกระบวนการสร้าง PDF
    html2pdf().set(opt).from(element).save();
}
</script>
</body>
</html>
